name: gasis_final
description: GASIS refactored Flutter project with Cubit architecture.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  shared_preferences: ^2.3.2
  geolocator: ^14.0.2
  google_maps_flutter: ^2.15.0
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/src/i18n/
    - assets/readme_pics/
